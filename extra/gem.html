<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qskill | Student Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animated Gradient Background */
        .bg-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Premium Button Animation */
        .btn-premium {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }

        /* Floating Animation for UI depth */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <div class="absolute top-20 left-20 w-64 h-64 bg-sky-500/10 rounded-full blur-[100px] float-anim"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px] float-anim" style="animation-delay: -3s;"></div>

    <div class="w-full max-w-md z-10">
        <div class="flex flex-col items-center mb-10 transition-all duration-1000 transform translate-y-0 opacity-100">
            <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-4 border border-white/20 shadow-xl">
                <span class="text-3xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">Q</span>
            </div>
            <h1 class="text-white text-2xl font-semibold tracking-tight">Welcome to Qskill</h1>
            <p class="text-slate-400 text-sm mt-2">Elevate your learning journey</p>
        </div>

        <div class="glass-card rounded-3xl p-10 transition-all duration-500 hover:border-white/20">
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label for="email" class="text-xs font-medium text-slate-400 uppercase tracking-widest ml-1">Student Email</label>
                    <div class="relative group">
                        <input 
                            type="email" 
                            id="email" 
                            required
                            placeholder="name@university.edu"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500/50 transition-all duration-300"
                        >
                    </div>
                </div>
                    <!-- {% if error %}
                        <p style="color:red;">{{ error }}</p>
                    {% endif %} -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="btn-premium w-full py-4 rounded-xl text-white font-semibold flex items-center justify-center gap-2 group"
                >
                    <span>Enter Portal</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-slate-500 text-xs">
                    Protected by SecureGate Pro &bull; <a href="#" class="text-sky-400 hover:text-sky-300 transition-colors">Privacy Policy</a>
                </p>
            </div>
        </div>
        
        <p class="text-center mt-10 text-slate-600 text-sm">
            © 2026 Qskill Global Education
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Premium Loading Animation
            btn.innerHTML = `<span class="flex items-center gap-3">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Authenticating...
            </span>`;
            
            // Simulate network request
            setTimeout(() => {
                alert('Access Granted. Welcome, Student!');
                btn.innerHTML = 'Enter Portal';
            }, 2000);
        });
    </script>
</body>
</html>
